name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-tests:
    name: PHP Tests And Laravel Smoke Checks
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_DEBUG: false
      APP_URL: https://lifeat.example.test
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      BROADCAST_CONNECTION: 'null'
      ERROR_TRACKING_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, openssl, fileinfo, gd, curl, pdo_sqlite, sqlite3
          ini-values: memory_limit=512M
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Run PHPUnit
        run: vendor/bin/phpunit --display-warnings

      - name: Check route registration
        run: php artisan route:list --except-vendor --ansi

      - name: Check cacheable release artifacts
        run: |
          php artisan config:cache --ansi
          php artisan route:cache --ansi
          php artisan view:cache --ansi
          php artisan config:clear --ansi
          php artisan route:clear --ansi
          php artisan view:clear --ansi

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Audit Composer dependencies
        run: composer audit --locked --no-interaction

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
