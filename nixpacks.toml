[variables]
IS_LARAVEL = "true"
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.setup]
nixPkgs = ["...", "curl", "python311Packages.supervisor"]

[phases.build]
cmds = [
    "...",
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh",
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/usr/bin/env bash
set -euo pipefail

mkdir -p /etc/supervisor/conf.d
cp /assets/worker-nginx.conf /etc/supervisor/conf.d/
cp /assets/worker-phpfpm.conf /etc/supervisor/conf.d/

if [ "${QUEUE_WORKER_ENABLED:-false}" = "true" ]; then
    cp /assets/worker-laravel.conf /etc/supervisor/conf.d/
fi

if [ "${SCHEDULER_ENABLED:-false}" = "true" ]; then
    cp /assets/worker-scheduler.conf /etc/supervisor/conf.d/
fi

chown -R www-data:www-data /app/storage /app/bootstrap/cache || true
chmod -R 775 /app/storage /app/bootstrap/cache || true

if [ "${DB_CONNECTION:-sqlite}" = "sqlite" ]; then
    SQLITE_DATABASE="${DB_DATABASE:-/app/storage/database.sqlite}"

    if [[ "$SQLITE_DATABASE" != /* ]]; then
        SQLITE_DATABASE="/app/$SQLITE_DATABASE"
    fi

    export DB_DATABASE="$SQLITE_DATABASE"

    mkdir -p "$(dirname "$SQLITE_DATABASE")"

    if [ ! -f "$SQLITE_DATABASE" ] && [ -f /app/database/database.sqlite ]; then
        cp /app/database/database.sqlite "$SQLITE_DATABASE"
    fi

    touch "$SQLITE_DATABASE"
    chown -R www-data:www-data "$(dirname "$SQLITE_DATABASE")" "$SQLITE_DATABASE" || true
    chmod 775 "$(dirname "$SQLITE_DATABASE")" || true
    chmod 664 "$SQLITE_DATABASE" || true
fi

php /app/artisan storage:link --force || true
php /app/artisan optimize || true

if [ "${RUN_MIGRATIONS:-true}" != "false" ]; then
    php /app/artisan migrate --force
fi

node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf

exec supervisord -c /etc/supervisord.conf -n
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s_%(process_num)02d
command=nginx -c /etc/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-nginx.log
stderr_logfile=/var/log/worker-nginx.log
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s_%(process_num)02d
command=php-fpm -y /assets/php-fpm.conf -F
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-phpfpm.log
stderr_logfile=/var/log/worker-phpfpm.log
'''

"worker-laravel.conf" = '''
[program:worker-laravel]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan queue:work --sleep=3 --tries=3 --timeout=120
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
startsecs=0
stopwaitsecs=120
stdout_logfile=/var/log/worker-laravel.log
stderr_logfile=/var/log/worker-laravel.log
'''

"worker-scheduler.conf" = '''
[program:worker-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=php /app/artisan schedule:work
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
startsecs=0
stopwaitsecs=120
stdout_logfile=/var/log/worker-scheduler.log
stderr_logfile=/var/log/worker-scheduler.log
'''

"php-fpm.conf" = '''
[www]
listen = 127.0.0.1:9000
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
clear_env = no
php_admin_value[memory_limit] = 512M
php_admin_value[post_max_size] = 64M
php_admin_value[upload_max_filesize] = 64M
'''

"nginx.template.conf" = '''
user www-data www-data;
worker_processes auto;
daemon off;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    include $!{nginx}/conf/mime.types;
    default_type application/octet-stream;
    index index.php index.html;

    access_log /var/log/nginx-access.log;
    error_log /var/log/nginx-error.log;

    sendfile on;
    tcp_nopush on;
    server_tokens off;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name _;
        root /app/public;

        add_header X-Content-Type-Options "nosniff";
        client_max_body_size 64M;
        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 16 16k;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''
